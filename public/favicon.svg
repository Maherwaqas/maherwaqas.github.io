<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <radialGradient id="g" cx="35%" cy="30%" r="75%">
      <stop offset="0%"   stop-color="#20C080"/>
      <stop offset="100%" stop-color="#053D2E"/>
    </radialGradient>
  </defs>

  <!-- Teal circle background -->
  <circle cx="16" cy="16" r="16" fill="url(#g)"/>

  <!--
    W letter — thick stroked polyline, round caps/joins.
    Coordinates tuned so it fills ~70% of the circle and reads at 16 × 16.
    Points:  top-left  →  left-trough  →  centre-peak  →  right-trough  →  top-right
  -->
  <polyline
    points="4.5,8.5 10,23.5 16,14.5 22,23.5 27.5,8.5"
    stroke="white"
    stroke-width="3.6"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- Atom nodes at the three W top-vertices (the materials-science mark) -->
  <circle cx="4.5"  cy="8.5"  r="2.2" fill="#A7F3D0"/>
  <circle cx="16"   cy="14.5" r="2.2" fill="#A7F3D0"/>
  <circle cx="27.5" cy="8.5"  r="2.2" fill="#A7F3D0"/>
</svg>
